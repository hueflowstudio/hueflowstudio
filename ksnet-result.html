<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>결제 결과 — Hueflow Studio</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500,600,700&display=swap">
<style>
  :root {
    --bg: #FAF9F5;
    --ink: #1F1F1F;
    --mid: #77736B;
    --line: rgba(31,31,31,.14);
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background: var(--bg);
    color: var(--ink);
    font-family: "General Sans", "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  main {
    width: min(100%, 640px);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 40px 0;
  }
  .eyebrow {
    margin: 0 0 16px;
    color: #A88975;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0 0 16px;
    font-size: clamp(32px, 8vw, 64px);
    font-weight: 300;
    line-height: 1;
  }
  p {
    margin: 0;
    color: var(--mid);
    line-height: 1.7;
  }
  dl {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr);
    gap: 10px 18px;
    margin: 32px 0 0;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }
  dt { color: var(--mid); }
  dd { margin: 0; word-break: break-all; }
  a {
    display: inline-flex;
    margin-top: 32px;
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Payment Result</p>
  <h1 id="title">결제 결과</h1>
  <p id="message">KSNET 인증결제 결과를 확인하고 있습니다.</p>
  <dl>
    <dt>승인여부</dt><dd id="authyn">-</dd>
    <dt>거래번호</dt><dd id="trno">-</dd>
    <dt>주문번호</dt><dd id="ordno">-</dd>
    <dt>승인번호</dt><dd id="authno">-</dd>
    <dt>금액</dt><dd id="amt">-</dd>
    <dt>메시지</dt><dd id="msg">-</dd>
  </dl>
  <a href="Plano.html">Plano로 돌아가기</a>
</main>
<script>
  (function(){
    var params = new URLSearchParams(window.location.search);
    var authyn = params.get('authyn') || '';
    var ok = authyn.toUpperCase() === 'O' || authyn.toUpperCase() === 'Y';
    document.getElementById('title').textContent = ok ? '결제가 승인되었습니다.' : '결제 결과가 도착했습니다.';
    document.getElementById('message').textContent = ok
      ? '신청 확인 후 안내를 전달드립니다.'
      : '테스트 또는 취소 결과일 수 있습니다. 필요하면 카카오톡 채널로 문의해주세요.';
    document.getElementById('authyn').textContent = authyn || '-';
    document.getElementById('trno').textContent = params.get('trno') || '-';
    document.getElementById('ordno').textContent = params.get('ordno') || '-';
    document.getElementById('authno').textContent = params.get('authno') || '-';
    document.getElementById('amt').textContent = params.get('amt') || '-';
    document.getElementById('msg').textContent = [params.get('msg1'), params.get('msg2')].filter(Boolean).join(' / ') || '-';
  })();
</script>
</body>
</html>
